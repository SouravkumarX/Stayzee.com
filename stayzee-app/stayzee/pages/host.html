<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Listings — Stayzee Host</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { padding-top:66px; background:var(--cream); }
  .host-layout { max-width:1100px; margin:0 auto; padding:2.5rem 5%; }
  .host-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
  .listings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.5rem; }
  .listing-card { background:var(--white); border:1px solid var(--border); border-radius:16px; overflow:hidden; transition:transform 0.2s,box-shadow 0.2s; }
  .listing-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
  .listing-card-img { width:100%; height:180px; object-fit:cover; background:var(--light-gray); display:flex; align-items:center; justify-content:center; font-size:3rem; }
  .listing-card-body { padding:1.2rem; }
  .listing-card-body h3 { font-weight:700; font-size:1rem; margin-bottom:0.3rem; }
  .listing-card-body .city { font-size:0.82rem; color:var(--gray); margin-bottom:0.8rem; }
  .listing-card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:0.8rem; border-top:1px solid var(--border); }
  .listing-price { font-weight:700; color:var(--orange); }
  .listing-actions { display:flex; gap:0.5rem; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; display:none; align-items:center; justify-content:center; padding:1rem; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--white); border-radius:20px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:1.5rem 2rem; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--white); z-index:1; }
  .modal-header h2 { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; }
  .modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--gray); padding:0.2rem; }
  .modal-body { padding:2rem; }
  .modal-footer { padding:1rem 2rem; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:0.8rem; }

  /* IMAGE UPLOAD */
  .image-upload-zone { border:2px dashed var(--border); border-radius:12px; padding:2.5rem; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--cream); }
  .image-upload-zone:hover, .image-upload-zone.drag { border-color:var(--orange); background:#fff7ed; }
  .image-upload-zone .upload-icon { font-size:2.5rem; margin-bottom:0.8rem; }
  .image-upload-zone p { color:var(--gray); font-size:0.88rem; }
  .image-upload-zone span { color:var(--orange); font-weight:600; }
  .image-previews { display:grid; grid-template-columns:repeat(4,1fr); gap:0.8rem; margin-top:1rem; }
  .preview-item { position:relative; aspect-ratio:1; border-radius:10px; overflow:hidden; }
  .preview-item img { width:100%; height:100%; object-fit:cover; }
  .preview-remove { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center; }
  .upload-progress { height:4px; background:var(--border); border-radius:2px; margin-top:0.5rem; overflow:hidden; display:none; }
  .upload-progress-bar { height:100%; background:var(--orange); border-radius:2px; transition:width 0.3s; }

  /* AMENITIES */
  .amenity-grid { display:flex; flex-wrap:wrap; gap:0.5rem; }
  .amenity-chip { padding:0.4rem 0.9rem; border:1.5px solid var(--border); border-radius:50px; font-size:0.82rem; cursor:pointer; transition:all 0.2s; background:var(--white); }
  .amenity-chip.selected { border-color:var(--orange); background:#fff7ed; color:var(--orange); font-weight:600; }

  .empty-state { text-align:center; padding:4rem; color:var(--gray); }
  .empty-state .empty-icon { font-size:4rem; margin-bottom:1rem; }
</style>
</head>
<body>
<div id="toast-container"></div>

<!-- NAV -->
<nav class="topnav">
  <a href="../index.html" class="nav-logo">Stay<span>zee</span></a>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="explore.html" class="nav-link">Explore</a>
    <button class="nav-btn outline" onclick="signOut()">Log Out</button>
  </div>
</nav>

<div class="host-layout">
  <div class="host-header">
    <div>
      <h1 class="page-title">My Listings</h1>
      <p class="page-sub">Manage your spaces and welcome guests</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add New Listing</button>
  </div>
  <div id="listings-container"><div class="spinner"></div></div>
</div>

<!-- ADD / EDIT LISTING MODAL -->
<div class="modal-overlay" id="listing-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Add New Listing</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="listing-form">
        <input type="hidden" id="listing-id">

        <!-- IMAGES -->
        <div class="form-group">
          <label>Photos (up to 6)</label>
          <div class="image-upload-zone" id="upload-zone" onclick="document.getElementById('img-input').click()" ondragover="handleDrag(event)" ondrop="handleDrop(event)">
            <div class="upload-icon">📷</div>
            <p><span>Click to upload</span> or drag & drop</p>
            <p style="font-size:0.78rem;margin-top:0.3rem">PNG, JPG up to 5MB each</p>
          </div>
          <input type="file" id="img-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
          <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="progress-bar" style="width:0%"></div></div>
          <div class="image-previews" id="image-previews"></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group" style="margin:0">
            <label>Listing Title *</label>
            <input type="text" id="f-title" placeholder="Cosy room in South Delhi" required>
          </div>
          <div class="form-group" style="margin:0">
            <label>City *</label>
            <input type="text" id="f-city" placeholder="New Delhi" required>
          </div>
        </div>
        <div class="form-group" style="margin-top:1rem">
          <label>Full Address</label>
          <input type="text" id="f-address" placeholder="Hauz Khas Village, New Delhi">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="f-desc" placeholder="Describe your space, neighbourhood, house rules..."></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem">
          <div class="form-group" style="margin:0">
            <label>Price / Night (₹) *</label>
            <input type="number" id="f-price" placeholder="500" min="100" required>
          </div>
          <div class="form-group" style="margin:0">
            <label>Max Guests</label>
            <input type="number" id="f-guests" placeholder="1" min="1" max="10" value="1">
          </div>
          <div class="form-group" style="margin:0">
            <label>Room Type</label>
            <select id="f-roomtype">
              <option value="private_room">Private Room</option>
              <option value="shared_room">Shared Room</option>
              <option value="entire_place">Entire Place</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top:1rem">
          <label>Gender Filter</label>
          <select id="f-gender">
            <option value="any">Anyone Welcome</option>
            <option value="female_only">Female Guests Only</option>
            <option value="male_only">Male Guests Only</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amenities</label>
          <div class="amenity-grid" id="amenity-grid">
            <!-- filled by JS -->
          </div>
        </div>
        <div class="form-group">
          <label>House Rules</label>
          <textarea id="f-rules" placeholder="No smoking, Quiet hours after 10pm..."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveListing()">Save Listing</button>
    </div>
  </div>
</div>

<script src="../js/supabase.js"></script>
<script>
  const AMENITIES = ['WiFi','Kitchen','AC','Parking','TV','Washing Machine','Hot Water','Study Desk','Gym','Swimming Pool','Pet Friendly','Meals Available'];
  let selectedAmenities = [];
  let uploadedImages = [];
  let currentUser = null;
  let editingId = null;

  function showToast(msg, type='info') {
    const t = document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(()=>t.remove(),3500);
  }

  function buildAmenities() {
    document.getElementById('amenity-grid').innerHTML = AMENITIES.map(a =>
      `<div class="amenity-chip" onclick="toggleAmenity(this,'${a}')">${a}</div>`
    ).join('');
  }

  function toggleAmenity(el, name) {
    el.classList.toggle('selected');
    if (el.classList.contains('selected')) selectedAmenities.push(name);
    else selectedAmenities = selectedAmenities.filter(a=>a!==name);
  }

  function openModal(listing=null) {
    editingId = listing?.id || null;
    document.getElementById('modal-title').textContent = listing ? 'Edit Listing' : 'Add New Listing';
    if (listing) {
      document.getElementById('f-title').value = listing.title||'';
      document.getElementById('f-city').value = listing.city||'';
      document.getElementById('f-address').value = listing.address||'';
      document.getElementById('f-desc').value = listing.description||'';
      document.getElementById('f-price').value = listing.price_per_night||'';
      document.getElementById('f-guests').value = listing.max_guests||1;
      document.getElementById('f-roomtype').value = listing.room_type||'private_room';
      document.getElementById('f-gender').value = listing.gender_filter||'any';
      document.getElementById('f-rules').value = listing.house_rules||'';
      uploadedImages = listing.images||[];
      selectedAmenities = listing.amenities||[];
      renderPreviews();
      // select amenity chips
      document.querySelectorAll('.amenity-chip').forEach(c => {
        if (selectedAmenities.includes(c.textContent)) c.classList.add('selected');
      });
    } else {
      document.getElementById('listing-form').reset();
      uploadedImages = []; selectedAmenities = [];
      document.getElementById('image-previews').innerHTML = '';
      document.querySelectorAll('.amenity-chip').forEach(c=>c.classList.remove('selected'));
    }
    document.getElementById('listing-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('listing-modal').classList.remove('open'); }

  function renderPreviews() {
    document.getElementById('image-previews').innerHTML = uploadedImages.map((url,i)=>`
      <div class="preview-item">
        <img src="${url}" alt="preview">
        <button class="preview-remove" onclick="removeImage(${i})">✕</button>
      </div>`).join('');
  }

  function removeImage(i) { uploadedImages.splice(i,1); renderPreviews(); }

  function handleDrag(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag'); }
  function handleDrop(e) { e.preventDefault(); document.getElementById('upload-zone').classList.remove('drag'); handleFiles(e.dataTransfer.files); }

  async function handleFiles(files) {
    if (!currentUser) return;
    if (uploadedImages.length + files.length > 6) { showToast('Max 6 images allowed','error'); return; }
    const progress = document.getElementById('upload-progress');
    const bar = document.getElementById('progress-bar');
    progress.style.display = 'block';
    const tempId = editingId || 'temp_' + Date.now();
    for (let i=0; i<files.length; i++) {
      bar.style.width = Math.round(((i+1)/files.length)*100)+'%';
      const { url, error } = await uploadListingImage(files[i], tempId);
      if (error) showToast('Upload failed: '+error.message,'error');
      else uploadedImages.push(url);
    }
    progress.style.display='none'; bar.style.width='0%';
    renderPreviews();
  }

  async function saveListing() {
    const title = document.getElementById('f-title').value.trim();
    const city  = document.getElementById('f-city').value.trim();
    const price = parseFloat(document.getElementById('f-price').value);
    if (!title||!city||!price) { showToast('Please fill required fields','error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled=true; btn.textContent='Saving...';

    const payload = {
      host_id: currentUser.id, title, city,
      address: document.getElementById('f-address').value,
      description: document.getElementById('f-desc').value,
      price_per_night: price,
      max_guests: parseInt(document.getElementById('f-guests').value)||1,
      room_type: document.getElementById('f-roomtype').value,
      gender_filter: document.getElementById('f-gender').value,
      house_rules: document.getElementById('f-rules').value,
      amenities: selectedAmenities,
      images: uploadedImages,
      is_active: true
    };

    // Make sure user is marked as host in DB
    await upsertProfile({ id: currentUser.id, is_host: true });

    let error;
    if (editingId) { ({ error } = await updateListing(editingId, payload)); }
    else { ({ error } = await createListing(payload)); }

    btn.disabled=false; btn.textContent='Save Listing';
    if (error) { showToast(error.message,'error'); return; }
    showToast(editingId?'Listing updated!':'Listing created!','success');
    closeModal(); loadListings();
  }

  async function deleteListing(id) {
    if (!confirm('Delete this listing?')) return;
    const { error } = await sb.from('listings').delete().eq('id',id);
    if (error) showToast(error.message,'error');
    else { showToast('Listing deleted','info'); loadListings(); }
  }

  async function loadListings() {
    const container = document.getElementById('listings-container');
    const { data, error } = await sb.from('listings').select('*').eq('host_id', currentUser.id).order('created_at',{ascending:false});
    if (error) { container.innerHTML=`<p style="color:var(--danger)">${error.message}</p>`; return; }
    if (!data||data.length===0) {
      container.innerHTML=`<div class="empty-state"><div class="empty-icon">🏡</div>
        <h3>No listings yet</h3><p>Add your first space to start welcoming guests.</p>
        <button class="btn btn-primary" style="margin-top:1.5rem" onclick="openModal()">+ Add Listing</button></div>`;
      return;
    }
    container.innerHTML=`<div class="listings-grid">${data.map(l=>`
      <div class="listing-card">
        ${l.images&&l.images.length>0
          ? `<img src="${l.images[0]}" class="listing-card-img" style="display:block">`
          : `<div class="listing-card-img">🏡</div>`}
        <div class="listing-card-body">
          <h3>${l.title}</h3>
          <div class="city">📍 ${l.city} · ${l.room_type?.replace('_',' ')}</div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem">
            <span class="badge ${l.is_active?'badge-success':'badge-danger'}">${l.is_active?'Active':'Inactive'}</span>
            <span class="badge badge-info">${l.gender_filter||'any'}</span>
          </div>
          <div class="listing-card-footer">
            <div class="listing-price">₹${parseFloat(l.price_per_night).toLocaleString('en-IN')}/night</div>
            <div class="listing-actions">
              <button class="btn btn-outline btn-sm" onclick='openModal(${JSON.stringify(l)})'>Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteListing('${l.id}')">Delete</button>
            </div>
          </div>
        </div>
      </div>`).join('')}</div>`;
  }

  (async () => {
    currentUser = await requireAuth('../pages/login.html');
    if (!currentUser) return;
    buildAmenities();
    loadListings();
    // make sure user is a host
    await upsertProfile({ id: currentUser.id, is_host: true });
  })();
</script>
</body>
</html>
