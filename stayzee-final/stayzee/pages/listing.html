<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing — Stayzee</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { padding-top:66px; }
  .listing-wrap { max-width:1100px; margin:0 auto; padding:2.5rem 5%; }
  .photo-grid { display:grid; grid-template-columns:2fr 1fr 1fr; grid-template-rows:220px 220px; gap:8px; border-radius:16px; overflow:hidden; margin-bottom:2.5rem; }
  .photo-grid .main-photo { grid-row:1/3; }
  .photo-grid img, .photo-grid .photo-placeholder { width:100%; height:100%; object-fit:cover; background:var(--light-gray); display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
  .listing-layout { display:grid; grid-template-columns:1fr 380px; gap:3rem; align-items:start; }
  .listing-detail h1 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; margin-bottom:0.5rem; }
  .listing-sub { color:var(--gray); font-size:0.92rem; margin-bottom:1.5rem; }
  .info-chips { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:1.5rem; }
  .info-chip { background:var(--cream); border:1px solid var(--border); border-radius:50px; padding:0.4rem 1rem; font-size:0.82rem; font-weight:500; }
  .host-card { display:flex; align-items:center; gap:1rem; padding:1.2rem; background:var(--cream); border-radius:12px; border:1px solid var(--border); margin:1.5rem 0; }
  .host-avatar { width:56px; height:56px; border-radius:50%; object-fit:cover; border:2px solid var(--orange); }
  .host-info h4 { font-weight:700; font-size:0.97rem; }
  .host-info p  { font-size:0.82rem; color:var(--gray); }
  .host-verified { display:inline-block; background:#d1fae5; color:#065f46; font-size:0.72rem; font-weight:600; padding:0.2rem 0.6rem; border-radius:20px; margin-top:0.25rem; }
  .amenities-grid { display:flex; flex-wrap:wrap; gap:0.6rem; margin-top:0.8rem; }
  .amenity-tag { background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:0.4rem 0.8rem; font-size:0.82rem; }
  .section-head { font-weight:700; font-size:1rem; margin-bottom:0.6rem; margin-top:1.5rem; }

  /* BOOKING CARD */
  .booking-card { background:var(--white); border:1px solid var(--border); border-radius:20px; padding:1.8rem; position:sticky; top:88px; box-shadow:var(--shadow); }
  .booking-price { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; margin-bottom:1.2rem; }
  .booking-price span { font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:400; color:var(--gray); }
  .date-row { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; }
  .price-breakdown { margin-top:1.2rem; padding-top:1.2rem; border-top:1px solid var(--border); }
  .price-row-item { display:flex; justify-content:space-between; font-size:0.88rem; margin-bottom:0.6rem; color:var(--gray); }
  .price-row-item.total { font-weight:700; color:var(--navy); font-size:0.95rem; border-top:1px solid var(--border); padding-top:0.6rem; margin-top:0.4rem; }

  /* REVIEWS */
  .reviews-list { margin-top:1rem; }
  .review-item { padding:1.2rem 0; border-bottom:1px solid var(--border); }
  .review-item:last-child { border-bottom:none; }
  .reviewer { display:flex; align-items:center; gap:0.8rem; margin-bottom:0.6rem; }
  .reviewer-avatar { width:38px; height:38px; border-radius:50%; object-fit:cover; background:var(--light-gray); }
  .reviewer-name { font-weight:600; font-size:0.9rem; }
  .reviewer-date { font-size:0.78rem; color:var(--gray); }

  @media(max-width:800px) { .listing-layout{grid-template-columns:1fr;} .photo-grid{grid-template-columns:1fr;grid-template-rows:280px;} .photo-grid>*:not(.main-photo){display:none;} }
</style>
</head>
<body>
<div id="toast-container"></div>

<nav class="topnav">
  <a href="../index.html" class="nav-logo">Stay<span>zee</span></a>
  <div class="nav-right">
    <a href="explore.html" class="nav-link">← All Stays</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
  </div>
</nav>

<div class="listing-wrap">
  <div id="listing-content"><div class="spinner"></div></div>
</div>

<script src="../js/supabase.js"></script>
<script>
  function showToast(msg,type='info'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),3500);}

  let listing = null;
  let currentUser = null;

  function calcNights() {
    const ci = document.getElementById('b-checkin')?.value;
    const co = document.getElementById('b-checkout')?.value;
    if (!ci||!co) return 0;
    const diff = (new Date(co) - new Date(ci)) / (1000*60*60*24);
    return Math.max(0, diff);
  }

  function updatePriceBreakdown() {
    const nights = calcNights();
    const pricePer = listing?.price_per_night||0;
    const subtotal = nights * pricePer;
    const serviceFee = Math.round(subtotal * 0.2);
    const total = subtotal + serviceFee;
    document.getElementById('b-nights').textContent = nights > 0 ? `₹${pricePer.toLocaleString('en-IN')} × ${nights} nights` : '—';
    document.getElementById('b-subtotal').textContent = nights > 0 ? '₹'+subtotal.toLocaleString('en-IN') : '—';
    document.getElementById('b-servicefee').textContent = nights > 0 ? '₹'+serviceFee.toLocaleString('en-IN') : '—';
    document.getElementById('b-total').textContent = nights > 0 ? '₹'+total.toLocaleString('en-IN') : '—';
  }

  async function bookNow() {
    if (!currentUser) { window.location.href='login.html'; return; }
    const checkin  = document.getElementById('b-checkin').value;
    const checkout = document.getElementById('b-checkout').value;
    const guests   = parseInt(document.getElementById('b-guests').value)||1;
    const message  = document.getElementById('b-message').value;
    if (!checkin||!checkout) { showToast('Select check-in and check-out dates','error'); return; }
    const nights = calcNights();
    if (nights < 1) { showToast('Check-out must be after check-in','error'); return; }
    const total = nights * listing.price_per_night * 1.2;
    const btn = document.getElementById('book-btn');
    btn.disabled=true; btn.textContent='Booking...';
    const { error } = await createBooking({
      listing_id: listing.id, guest_id: currentUser.id,
      host_id: listing.host_id, check_in: checkin, check_out: checkout,
      guests, total_price: total.toFixed(2), message, status: 'pending'
    });
    btn.disabled=false; btn.textContent='Request to Book';
    if (error) { showToast(error.message,'error'); return; }
    showToast('Booking request sent! 🎉','success');
    setTimeout(() => window.location.href='bookings.html', 1200);
  }

  function starsHtml(r) { return '★'.repeat(Math.round(r||0))+'☆'.repeat(5-Math.round(r||0)); }

  async function loadListing() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { window.location.href='explore.html'; return; }

    const [sessionRes, listingRes] = await Promise.all([getSession(), getListingById(id)]);
    currentUser = sessionRes?.user||null;
    listing = listingRes.data;
    if (!listing) { window.location.href='explore.html'; return; }

    const { data: reviews } = await getListingReviews(id);
    const host = listing.profiles;
    const today = new Date().toISOString().split('T')[0];

    document.title = listing.title + ' — Stayzee';

    document.getElementById('listing-content').innerHTML = `
      <!-- PHOTO GRID -->
      <div class="photo-grid">
        <div class="main-photo">
          ${listing.images?.[0]?`<img src="${listing.images[0]}" alt="${listing.title}">`:`<div class="photo-placeholder">🏡</div>`}
        </div>
        ${[1,2,3,4].map(i=>listing.images?.[i]
          ?`<img src="${listing.images[i]}" alt="photo ${i+1}">`
          :`<div class="photo-placeholder" style="font-size:1.5rem;color:var(--border)">+</div>`).join('')}
      </div>

      <div class="listing-layout">
        <!-- DETAIL -->
        <div class="listing-detail">
          <h1>${listing.title}</h1>
          <div class="listing-sub">📍 ${listing.city}${listing.address?', '+listing.address:''} · ⭐ ${listing.rating||'New'} (${reviews?.length||0} reviews)</div>
          <div class="info-chips">
            <span class="info-chip">🏠 ${(listing.room_type||'').replace('_',' ')}</span>
            <span class="info-chip">👥 Up to ${listing.max_guests} guest${listing.max_guests>1?'s':''}</span>
            <span class="info-chip">${listing.gender_filter==='female_only'?'♀️ Female only':listing.gender_filter==='male_only'?'♂️ Male only':'🌍 All welcome'}</span>
          </div>

          <div class="host-card">
            <img src="${host?.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(host?.full_name||'H')}&background=1a2744&color=fff`}" class="host-avatar">
            <div class="host-info">
              <h4>Hosted by ${host?.full_name||'Unknown'}</h4>
              <p>⭐ ${host?.rating||5.0} rating · Member since ${new Date(listing.created_at).getFullYear()}</p>
              <span class="host-verified">✅ ID Verified</span>
            </div>
          </div>

          ${listing.description?`<div class="section-head">About this space</div><p style="color:var(--gray);font-size:0.92rem;line-height:1.7">${listing.description}</p>`:''}

          ${listing.amenities?.length?`
            <div class="section-head">Amenities</div>
            <div class="amenities-grid">${listing.amenities.map(a=>`<span class="amenity-tag">✓ ${a}</span>`).join('')}</div>`:''}

          ${listing.house_rules?`<div class="section-head">House Rules</div><p style="color:var(--gray);font-size:0.88rem;line-height:1.7;white-space:pre-line">${listing.house_rules}</p>`:''}

          <div class="section-head">Reviews (${reviews?.length||0})</div>
          ${reviews?.length?`<div class="reviews-list">${reviews.map(r=>`
            <div class="review-item">
              <div class="reviewer">
                <img src="${r.profiles?.avatar_url||`https://ui-avatars.com/api/?name=${encodeURIComponent(r.profiles?.full_name||'G')}&background=e8820c&color=fff`}" class="reviewer-avatar">
                <div>
                  <div class="reviewer-name">${r.profiles?.full_name||'Guest'}</div>
                  <div class="reviewer-date">${new Date(r.created_at).toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</div>
                </div>
                <div style="margin-left:auto;color:#f59e0b;font-size:0.85rem">${starsHtml(r.rating)}</div>
              </div>
              <p style="font-size:0.88rem;color:var(--gray);line-height:1.6">${r.comment||''}</p>
            </div>`).join('')}</div>`
          :`<p style="color:var(--gray);font-size:0.88rem">No reviews yet. Be the first!</p>`}
        </div>

        <!-- BOOKING CARD -->
        <div>
          <div class="booking-card">
            <div class="booking-price">₹${parseFloat(listing.price_per_night).toLocaleString('en-IN')} <span>/ night</span></div>
            <div class="date-row">
              <div class="form-group" style="margin:0">
                <label>Check-in</label>
                <input type="date" id="b-checkin" min="${today}" onchange="updatePriceBreakdown()">
              </div>
              <div class="form-group" style="margin:0">
                <label>Check-out</label>
                <input type="date" id="b-checkout" min="${today}" onchange="updatePriceBreakdown()">
              </div>
            </div>
            <div class="form-group" style="margin-top:0.8rem">
              <label>Guests</label>
              <input type="number" id="b-guests" value="1" min="1" max="${listing.max_guests}">
            </div>
            <div class="form-group">
              <label>Message to Host (optional)</label>
              <textarea id="b-message" placeholder="Introduce yourself and share why you're traveling..."></textarea>
            </div>
            <div class="price-breakdown">
              <div class="price-row-item"><span id="b-nights">Select dates</span><span id="b-subtotal"></span></div>
              <div class="price-row-item"><span>Service fee (20%)</span><span id="b-servicefee"></span></div>
              <div class="price-row-item total"><span>Total</span><span id="b-total">—</span></div>
            </div>
            ${currentUser?.id === listing.host_id
              ? `<div class="btn btn-outline btn-full" style="margin-top:1rem;justify-content:center;cursor:default;opacity:0.6">This is your listing</div>`
              : `<button class="btn btn-primary btn-full" style="margin-top:1rem" id="book-btn" onclick="bookNow()">Request to Book</button>`}
            <p style="text-align:center;font-size:0.75rem;color:var(--gray);margin-top:0.8rem">You won't be charged until the host confirms</p>
          </div>
        </div>
      </div>`;
  }

  loadListing();
</script>
</body>
</html>
